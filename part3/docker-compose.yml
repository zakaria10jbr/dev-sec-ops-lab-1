version: "3.9"

# DevSecOps Lab - Session 3
# Hardened Docker Compose configuration

services:
  # ─── Flask Application ──────────────────────────────────────────────────────
  web:
    build:
      context: ../session1
      dockerfile: ../session3/Dockerfile
    image: devsecops-lab:latest
    container_name: lab_web
    restart: unless-stopped

    # Security: Non-root user defined in Dockerfile
    user: "1000:1000"

    # Security: Read-only filesystem with specific exceptions
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
      - /app/data:size=100m

    # Security: Drop ALL capabilities, add back only what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Only if binding to port < 1024

    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
      - seccomp:seccomp_profile.json  # Custom seccomp profile

    # Resource limits (DoS protection)
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

    # Environment: Secrets from .env file, never hardcoded
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

    ports:
      - "127.0.0.1:8000:8000"  # Only bind to localhost (reverse proxy handles TLS)

    networks:
      - app_network

    depends_on:
      - redis

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Redis (Session Store / Rate Limiter) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lab_redis
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=10m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --bind 127.0.0.1
      --loglevel warning
    networks:
      - app_network
    expose:
      - "6379"  # Not published to host

  # ─── Nginx Reverse Proxy (TLS Termination) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: lab_nginx
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=50m
      - /var/run:size=10m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    ports:
      - "443:443"
      - "80:80"   # Redirects to 443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - app_network
    depends_on:
      - web

networks:
  app_network:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/24

# Named volumes for persistent data (not anonymous)
volumes:
  app_data:
    driver: local
